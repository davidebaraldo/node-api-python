name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Deploy docs to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Fetch gh-pages
          git fetch origin gh-pages:gh-pages

          # Switch to gh-pages
          git checkout gh-pages

          # Copy docs (but preserve bench/ data)
          cp ../docs/index.html . 2>/dev/null || true

          # Use worktree approach: copy from main's docs/
          git checkout main -- docs/index.html
          mv docs/index.html index.html
          rm -rf docs/

          # Commit and push if changed
          git add index.html
          if git diff --cached --quiet; then
            echo "No docs changes"
          else
            git commit -m "docs: update site from main"
            git push origin gh-pages
          fi
