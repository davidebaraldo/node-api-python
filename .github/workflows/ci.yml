name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install ruff
      - run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Python lint
        run: ruff check src/python/

  test-python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}
    name: pytest / ${{ matrix.os }} / Python ${{ matrix.python }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - run: pip install pytest
      - run: pytest test/python/ -v

  build-and-test-native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22]
        python: ["3.13"]

    runs-on: ${{ matrix.os }}
    name: native / ${{ matrix.os }} / Node ${{ matrix.node }} / Py ${{ matrix.python }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install Python build deps
        run: pip install pybind11 numpy

      - name: Install Node.js deps
        run: npm ci

      - name: Build native addon
        run: npm run build:native

      - name: Build TypeScript
        run: npm run build:ts

      - name: Test types
        run: npx vitest run test/js/types.test.ts
      - name: Test sync-async
        run: npx vitest run test/js/sync-async.test.ts
      - name: Test import
        run: npx vitest run test/js/import.test.ts
      - name: Test callback
        run: npx vitest run test/js/callback.test.ts
      - name: Test integration
        run: npx vitest run test/js/integration.test.ts

  test-typegen-cli:
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    name: typegen-cli / ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - run: npm ci

      - name: Generate types from example
        run: node scripts/generate-types.js examples/basic/math_utils.py -o ${{ runner.temp }}/types-out

      - name: Verify generated .d.ts
        run: |
          grep "export function add" ${{ runner.temp }}/types-out/math_utils.d.ts
          grep "export function addSync" ${{ runner.temp }}/types-out/math_utils.d.ts
          grep "export function greet" ${{ runner.temp }}/types-out/math_utils.d.ts

      - name: Generate types from complex module
        run: node scripts/generate-types.js examples/fullstack/analytics.py -o ${{ runner.temp }}/types-out

      - name: Verify complex types
        run: |
          grep "export interface UserEvent" ${{ runner.temp }}/types-out/analytics.d.ts
          grep "export interface AnalyticsReport" ${{ runner.temp }}/types-out/analytics.d.ts

  smoke-test:
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    name: smoke / ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - run: npm ci
      - name: Run doctor
        run: node scripts/doctor.js || true
