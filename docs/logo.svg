<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Left circle (Python) — touching right circle at center -->
  <circle cx="172" cy="256" r="84" fill="none" stroke="#3572A5" stroke-width="28"/>

  <!-- Right circle (Node) — touching left circle at center -->
  <circle cx="340" cy="256" r="84" fill="none" stroke="#68BC45" stroke-width="28"/>

  <!-- Python symbol: two intertwined snakes -->
  <g transform="translate(172, 256)">
    <path d="M-6,-30 C-6,-20 -18,-14 -18,-4 C-18,6 -6,6 -6,16 C-6,26 -18,32 -18,42" fill="none" stroke="#FFD43B" stroke-width="8" stroke-linecap="round"/>
    <path d="M6,-38 C6,-28 18,-22 18,-12 C18,-2 6,-2 6,8 C6,18 18,24 18,34" fill="none" stroke="#3572A5" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-6" cy="-34" r="4" fill="#FFD43B"/>
    <circle cx="6" cy="-42" r="4" fill="#3572A5"/>
  </g>

  <!-- Node symbol: hexagon -->
  <g transform="translate(340, 256)">
    <polygon points="0,-38 33,-19 33,19 0,38 -33,19 -33,-19" fill="none" stroke="#68BC45" stroke-width="7" stroke-linejoin="round"/>
